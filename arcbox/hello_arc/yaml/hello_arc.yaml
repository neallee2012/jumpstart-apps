apiVersion: v1
kind: Service
metadata:
  name: hello-arc
  namespace: hello-arc 
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: hello-arc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-arc
  namespace: hello-arc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-arc
  template:
    metadata:
      labels:
        app: hello-arc
    spec:
      containers:
      - name: hello-arc
        image: mcr.microsoft.com/jumpstart/arcbox/hello_arc:1.0.0
        ports:
        - containerPort: 8080
        env:
        - name: MESSAGE
          value: This is an Azure Arc GitOps Demo! 1 2 3 4 5 6
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          value: "InstrumentationKey=08e5357e-1bc0-4205-9526-26b6ea62ea44;IngestionEndpoint=https://japaneast-1.in.applicationinsights.azure.com/;LiveEndpoint=https://japaneast.livediagnostics.monitor.azure.com/;ApplicationId=4db84578-8264-4aec-a015-000068901940"
